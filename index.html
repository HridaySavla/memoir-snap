<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>Memoir Snap</title>
</head>
<body>

<div class="container">
  <div class="nav">
    <button id="navCapture" onclick="showPage('capture')">📸 New Entry</button>
    <button id="navGallery" class="secondary" onclick="showPage('gallery')">🖼️ View Gallery</button>
  </div>

  <div id="capture" class="page active">
    <h1>Capture Moment</h1>
    <div class="video-container">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" class="hidden"></canvas>
    </div>
    <textarea id="note" placeholder="What's happening?"></textarea>
    <button id="snapBtn">📸 Take Photo</button>
    <button id="saveBtn" class="hidden">💾 Save Entry</button>
    <button id="retakeBtn" class="secondary hidden">🔄 Retake</button>
  </div>

  <div id="gallery" class="page">
    <h1>Your Gallery</h1>
    <div id="galleryList"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
